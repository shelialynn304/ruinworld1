<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chosen of the Hollow Star</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="crt-overlay" aria-hidden="true"></div>
    <main class="game-shell" id="app">
      <section id="titleScreen" class="panel title-screen">
        <h1>CHOSEN OF THE HOLLOW STAR</h1>
        <p class="subtitle">An eerie retro narrative RPG</p>
        <p class="flavor">The bells are silent. The ash remembers your name.</p>
        <div class="title-actions">
          <button id="startButton">Start New Journey</button>
          <button id="continueButton">Continue</button>
        </div>
      </section>

      <section id="gameScreen" class="hidden">
        <header class="top-row">
          <div class="panel area-panel">
            <span class="label">AREA</span>
            <span id="areaLabel">The Road to Ash</span>
          </div>
          <div class="panel controls-panel">
            <button id="saveButton">Save</button>
            <button id="loadButton">Load</button>
            <button id="musicToggle">Music: On</button>
            <button id="blipToggle">Blips: On</button>
          </div>
        </header>

        <section class="panel stats-panel">
          <h2>Vessel Status</h2>
          <div class="stats-grid">
            <p>Corruption: <span id="statCorruption">0</span></p>
            <p>Mercy: <span id="statMercy">0</span></p>
            <p>Influence: <span id="statInfluence">0</span></p>
            <p>Devotion: <span id="statDevotion">0</span></p>
            <p>Followers: <span id="statFollowers">0</span></p>
            <p>Gold: <span id="statGold">10</span></p>
          </div>
        </section>

        <section class="panel dialogue-panel" id="dialoguePanel">
          <div class="speaker-row">
            <span class="label">SPEAKER</span>
            <span id="speakerName">Narrator</span>
          </div>
          <p id="dialogueText" class="dialogue-text"></p>
          <div id="choiceList" class="choice-list"></div>
        </section>
      </section>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
